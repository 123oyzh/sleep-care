<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能睡眠管理 · 医生端</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #f0f4f8;
      color: #1a3a6b;
      min-height: 100vh;
    }

    /* ── 主容器，增加呼吸留白 ── */
    .container { max-width: 540px; margin: 0 auto; min-height: 100vh; padding: 32px 20px 56px; }

    /* ── 品牌区 ── */
    .brand { text-align: center; padding: 40px 0 32px; }
    .brand h1 { font-size: 24px; font-weight: 700; color: #1a3a6b; margin-bottom: 6px; }
    .brand .sub { font-size: 14px; color: #8da4c1; letter-spacing: 1px; }

    /* ── 卡片 ── */
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.04);
      padding: 28px;
      margin-bottom: 20px;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #f5f7fa;
    }
    .card-header h2 { font-size: 18px; color: #1a3a6b; }
    .btn-logout {
      background: none;
      border: 1px solid #dce3ed;
      color: #8da4c1;
      font-size: 13px;
      padding: 8px 18px;
      border-radius: 10px;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-logout:hover { border-color: #e53935; color: #e53935; }

    /* ── 输入框 ── */
    .input-group { margin-bottom: 18px; }
    .input-group input {
      width: 100%;
      height: 50px;
      border: 2px solid #eef1f6;
      border-radius: 14px;
      padding: 0 18px;
      font-size: 15px;
      color: #1a3a6b;
      outline: none;
      transition: border-color .25s, box-shadow .25s;
    }
    .input-group input:focus { border-color: #4A90D9; box-shadow: 0 0 0 3px rgba(74,144,217,0.08); }

    /* ── 主按钮 ── */
    .btn {
      width: 100%;
      height: 50px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, #4A90D9 0%, #357ABD 100%);
      box-shadow: 0 4px 16px rgba(74,144,217,0.25);
      transition: transform .15s, box-shadow .15s;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(74,144,217,0.35); }
    .btn:active { transform: translateY(0); }

    /* ── 小按钮 ── */
    .btn-sm {
      height: 34px;
      padding: 0 22px;
      font-size: 13px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: transform .15s, box-shadow .15s;
    }
    .btn-sm:hover { transform: translateY(-1px); }
    .btn-confirm {
      background: linear-gradient(135deg, #4A90D9 0%, #357ABD 100%);
      color: #fff;
      box-shadow: 0 3px 10px rgba(74,144,217,0.2);
    }
    .btn-confirm:hover { box-shadow: 0 5px 14px rgba(74,144,217,0.3); }
    .btn-view {
      background: #43a047;
      color: #fff;
      box-shadow: 0 3px 10px rgba(67,160,71,0.2);
    }
    .btn-view:hover { box-shadow: 0 5px 14px rgba(67,160,71,0.3); }

    .btn-back {
      background: none; border: none;
      color: #4A90D9; font-size: 14px;
      cursor: pointer; padding: 0;
      transition: opacity .2s;
    }
    .btn-back:hover { opacity: .7; }

    /* ── 患者卡片（hover 上浮动画） ── */
    .patient-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      margin-bottom: 12px;
      background: #fff;
      border-radius: 16px;
      border: 1px solid #f0f2f5;
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .patient-row:last-child { margin-bottom: 0; }
    .patient-row:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    }
    .patient-info { flex: 1; min-width: 0; }
    .patient-name {
      font-size: 16px;
      font-weight: 600;
      color: #1a3a6b;
    }
    .patient-phone { font-size: 13px; color: #8da4c1; margin-top: 5px; }
    .patient-meta { font-size: 12px; color: #b0bec5; margin-top: 3px; }
    .patient-actions { flex-shrink: 0; margin-left: 16px; }

    /* ── 状态标签（更醒目） ── */
    .tag {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 12px;
      border-radius: 12px;
      margin-left: 8px;
      vertical-align: middle;
      letter-spacing: .3px;
    }
    .tag-pending { background: #fff3cd; color: #e6a817; border: 1px solid #ffeeba; }
    .tag-active  { background: #d4edda; color: #2d8a3e; border: 1px solid #c3e6cb; }

    /* ── 评分大数字 ── */
    .score-big { text-align: center; padding: 28px 0 20px; }
    .score-big .num { font-size: 80px; font-weight: 800; color: #4A90D9; line-height: 1; }
    .score-big .unit { font-size: 22px; color: #8da4c1; margin-top: 6px; display: block; }

    /* ── 指标卡片网格 ── */
    .metrics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin: 24px 0;
    }
    .metric-item {
      background: linear-gradient(135deg, #f8fbff 0%, #f0f6ff 100%);
      border-radius: 16px;
      padding: 20px 14px;
      text-align: center;
      border: 1px solid rgba(74,144,217,0.08);
      transition: transform .2s ease;
    }
    .metric-item:hover { transform: translateY(-1px); }
    .metric-item .val { font-size: 28px; font-weight: 700; color: #1a3a6b; }
    .metric-item .lbl { font-size: 12px; color: #8da4c1; margin-top: 6px; }

    /* ── 趋势图表区 ── */
    .chart-section { margin-top: 28px; padding-top: 24px; border-top: 1px solid #f0f2f5; }
    .chart-section h3 { font-size: 16px; color: #1a3a6b; margin-bottom: 16px; }
    #trendChart { width: 100%; height: 300px; }

    /* ── 加载动画 ── */
    .loading-box, .empty-box, .error-box {
      text-align: center;
      padding: 48px 0;
      color: #999;
      font-size: 14px;
    }
    .error-box { color: #e53935; }

    /* 旋转圈 */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 32px; height: 32px;
      border: 3px solid #eef1f6;
      border-top-color: #4A90D9;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-bottom: 12px;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="container">

  <div class="brand">
    <h1>智能睡眠管理 · 医生端</h1>
    <div class="sub">专业睡眠数据分析平台</div>
  </div>

  <!-- 登录视图 -->
  <div id="view-login">
    <div class="card">
      <div class="card-header"><h2>医生登录</h2></div>
      <div class="input-group"><input type="tel" id="phone" placeholder="手机号" maxlength="11" autocomplete="tel"></div>
      <div class="input-group"><input type="password" id="password" placeholder="密码" autocomplete="current-password"></div>
      <button class="btn" onclick="handleLogin()">登 录</button>
      <div id="loginError" class="error-box hidden"></div>
    </div>
  </div>

  <!-- 主视图 -->
  <div id="view-main" class="hidden">

    <!-- 患者列表 -->
    <div id="view-list">
      <div class="card">
        <div class="card-header">
          <h2>您好，<span id="doctorName">医生</span></h2>
          <button class="btn-logout" onclick="logout()">退出登录</button>
        </div>
        <div id="patientList">
          <div class="loading-box"><div class="spinner"></div><div>加载中...</div></div>
        </div>
      </div>
    </div>

    <!-- 报告视图 -->
    <div id="view-report" class="hidden">
      <div class="card">
        <div class="card-header">
          <button class="btn-back" onclick="backToList()">← 返回列表</button>
          <h2 id="reportPatientName"></h2>
        </div>
        <div id="reportContent">
          <div class="loading-box"><div class="spinner"></div><div>加载中...</div></div>
        </div>
      </div>
    </div>

  </div>

</div>

<script>
var TOKEN = localStorage.getItem('doctor_token') || '';
var doctorName = localStorage.getItem('doctor_name') || '';

function api(path, method, body) {
  var opts = { method: method || 'GET', headers: { 'Content-Type': 'application/json' } };
  if (TOKEN) opts.headers['Authorization'] = 'Bearer ' + TOKEN;
  if (body) opts.body = JSON.stringify(body);
  return fetch('http://localhost:3000' + path, opts).then(function(r) { return r.json(); });
}

function show(id) {
  document.getElementById('view-login').classList.add('hidden');
  document.getElementById('view-main').classList.add('hidden');
  document.getElementById('view-list').classList.add('hidden');
  document.getElementById('view-report').classList.add('hidden');
  if (id === 'login') {
    document.getElementById('view-login').classList.remove('hidden');
  } else {
    document.getElementById('view-main').classList.remove('hidden');
    if (id === 'list') document.getElementById('view-list').classList.remove('hidden');
    if (id === 'report') document.getElementById('view-report').classList.remove('hidden');
  }
}

(function init() {
  if (TOKEN) { show('list'); document.getElementById('doctorName').textContent = doctorName || '医生'; loadPatients(); }
  else show('login');
})();

function handleLogin() {
  var phone = document.getElementById('phone').value.trim();
  var password = document.getElementById('password').value.trim();
  if (!phone || !password) {
    document.getElementById('loginError').textContent = '请输入手机号和密码';
    document.getElementById('loginError').classList.remove('hidden'); return;
  }
  api('/api/auth/login', 'POST', { phone: phone, password: password }).then(function(res) {
    if (res.code === 0 && res.data) {
      if (res.data.role !== 1) {
        document.getElementById('loginError').textContent = '该账号不是医生，无法登录';
        document.getElementById('loginError').classList.remove('hidden'); return;
      }
      TOKEN = res.data.token; doctorName = res.data.nickname || '医生';
      localStorage.setItem('doctor_token', TOKEN); localStorage.setItem('doctor_name', doctorName);
      document.getElementById('doctorName').textContent = doctorName;
      document.getElementById('loginError').classList.add('hidden');
      show('list'); loadPatients();
    } else {
      document.getElementById('loginError').textContent = res.message || '登录失败';
      document.getElementById('loginError').classList.remove('hidden');
    }
  }).catch(function() {
    document.getElementById('loginError').textContent = '网络请求失败，请检查服务器连接';
    document.getElementById('loginError').classList.remove('hidden');
  });
}

function logout() {
  TOKEN = ''; doctorName = '';
  localStorage.removeItem('doctor_token'); localStorage.removeItem('doctor_name');
  document.getElementById('phone').value = ''; document.getElementById('password').value = '';
  show('login');
}

function loadPatients() {
  var el = document.getElementById('patientList');
  el.innerHTML = '<div class="loading-box"><div class="spinner"></div><div>加载中...</div></div>';
  api('/api/doctor/patients').then(function(res) {
    if (res.code !== 0) { el.innerHTML = '<div class="error-box">' + (res.message || '加载失败') + '</div>'; return; }
    var list = res.data || [];
    if (list.length === 0) { el.innerHTML = '<div class="empty-box">暂无已授权患者</div>'; return; }
    var html = '';
    list.forEach(function(p) {
      var statusTag = p.status === 'active'
        ? '<span class="tag tag-active">✓ 已授权</span>'
        : '<span class="tag tag-pending">⏳ 待确认</span>';
      var phone = p.phone || '';
      var maskedPhone = phone.length === 11 ? phone.substring(0, 3) + ' **** ' + phone.substring(7) : phone;
      var scoreText = p.latest_score != null ? p.latest_score + ' 分' : '暂无';
      var actionBtn = p.status === 'pending'
        ? '<button class="btn-sm btn-confirm" onclick="confirmAuth(' + p.patient_id + ')">确认授权</button>'
        : '<button class="btn-sm btn-view" onclick="openReport(' + p.patient_id + ',\'' + escapeAttr(p.nickname || '患者') + '\')">查看报告</button>';
      html += '<div class="patient-row">' +
        '<div class="patient-info">' +
          '<div><span class="patient-name">' + escapeHtml(p.nickname || '未知') + '</span>' + statusTag + '</div>' +
          '<div class="patient-phone">📱 ' + maskedPhone + '</div>' +
          '<div class="patient-meta">最新评分: ' + scoreText + ' · 到期: ' + (p.expire_date || '') + '</div>' +
        '</div>' +
        '<div class="patient-actions">' + actionBtn + '</div>' +
      '</div>';
    });
    el.innerHTML = html;
  }).catch(function() { el.innerHTML = '<div class="error-box">网络请求失败</div>'; });
}

function confirmAuth(patientId) {
  if (!confirm('确认授权该患者查看数据吗？')) return;
  api('/api/doctor/confirm', 'PUT', { patient_id: patientId }).then(function(res) {
    if (res.code === 0) { alert('已确认授权'); loadPatients(); }
    else alert(res.message || '操作失败');
  }).catch(function() { alert('网络请求失败'); });
}

var currentPatientId = null;
var currentPatientName = '';

function openReport(patientId, name) {
  currentPatientId = patientId; currentPatientName = name;
  document.getElementById('reportPatientName').textContent = name;
  show('report'); loadReport();
}

function backToList() { show('list'); loadPatients(); }

function loadReport() {
  var el = document.getElementById('reportContent');
  el.innerHTML = '<div class="loading-box"><div class="spinner"></div><div>加载中...</div></div>';
  api('/api/doctor/patient/data?patient_id=' + currentPatientId).then(function(res) {
    if (res.code !== 0) { el.innerHTML = '<div class="error-box">' + (res.message || '暂无数据') + '</div>'; return; }
    var r = res.data || {};
    var ratio = r.total_minutes > 0 ? Math.round(r.deep_minutes / r.total_minutes * 100) : 0;
    var awakeCount = r.wake_minutes > 0 ? Math.max(1, Math.round(r.wake_minutes / 3)) : 0;
    el.innerHTML =
      '<div class="score-big"><div class="num">' + (r.sleep_score || 0) + '</div><div class="unit">睡眠评分</div></div>' +
      '<div class="metrics-grid">' +
        '<div class="metric-item"><div class="val">' + (r.total_minutes || 0) + '</div><div class="lbl">总时长 (分钟)</div></div>' +
        '<div class="metric-item"><div class="val">' + ratio + '%</div><div class="lbl">深睡比例</div></div>' +
        '<div class="metric-item"><div class="val">' + awakeCount + '</div><div class="lbl">觉醒次数</div></div>' +
        '<div class="metric-item"><div class="val">' + (r.avg_heart_rate || 0) + '</div><div class="lbl">平均心率</div></div>' +
      '</div>' +
      '<div class="chart-section"><h3>📈 7天评分趋势</h3><div id="trendChart"></div></div>';
    loadTrendChart();
  }).catch(function() { el.innerHTML = '<div class="error-box">网络请求失败</div>'; });
}

function loadTrendChart() {
  api('/api/sleep/summary?period=day').then(function(res) {
    if (res.code !== 0 || !res.data) return;
    var d = res.data;
    var chartDom = document.getElementById('trendChart');
    if (!chartDom) return;
    var chart = echarts.init(chartDom);
    chart.setOption({
      tooltip: { trigger: 'axis', formatter: function(p) { return p[0].axisValue + '<br/>评分: ' + p[0].value + ' 分'; } },
      grid: { left: '8%', right: '5%', top: '12%', bottom: '10%' },
      xAxis: { type: 'category', data: d.labels || [], axisLabel: { fontSize: 10, color: '#8da4c1' } },
      yAxis: { type: 'value', name: '评分', min: 0, max: 100, axisLabel: { fontSize: 10, color: '#8da4c1' }, splitLine: { lineStyle: { color: '#f5f7fa' } } },
      series: [{
        type: 'line', data: d.scores || [], smooth: true, symbol: 'circle', symbolSize: 6,
        lineStyle: { width: 2.5, color: '#4A90D9' }, itemStyle: { color: '#4A90D9' },
        areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: 'rgba(74,144,217,0.15)' }, { offset: 1, color: 'rgba(74,144,217,0.02)' }] } },
        markLine: { silent: true, symbol: 'none', lineStyle: { type: 'dashed', color: '#E53935', width: 1.5 }, label: { formatter: '平均 {c} 分', color: '#E53935', fontSize: 10 }, data: [{ yAxis: d.avg_score || 0 }] }
      }]
    });
    window.addEventListener('resize', function() { chart.resize(); });
  }).catch(function() {});
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str || ''));
  return div.innerHTML;
}
function escapeAttr(str) { return (str || '').replace(/'/g, "\\'").replace(/"/g, '\\"'); }
</script>
</body>
</html>
